name: better-ecommerce-store-prod

services:
  app:
    image: better-ecommerce-store:production
    build:
      context: .
      target: production
    init: true
    ports:
      - "${APP_PORT:-3001}:3001"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:?Copy .env.example to .env and set NEXT_PUBLIC_API_URL.}
      STORE_API_URL: ${DOCKER_STORE_API_URL:?Copy .env.example to .env and set DOCKER_STORE_API_URL.}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
